<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Seed Cardápio · Al-qui-mia</title>
<style>
body{font-family:sans-serif;padding:2rem;background:#1A120A;color:#F2EAD8}
h2{color:#D4A843;margin-bottom:.5rem}
p{color:#C8A878;margin-bottom:1.5rem;line-height:1.6}
button{padding:12px 28px;background:#D4A843;color:#1A120A;border:none;font-size:16px;cursor:pointer;font-weight:600}
button:disabled{background:#4A3820;color:#8A7256;cursor:not-allowed}
#log{margin-top:1.5rem;font-size:14px;line-height:2;color:#C8A878;white-space:pre-line}
.ok{color:#4CAF70}.err{color:#CF5555}
</style>
</head>
<body>
<h2>Seed do Cardápio — Café Al-qui-mia</h2>
<p>Apaga o cardápio atual e popula com o novo.<br>
<strong style="color:#CF5555">Execute apenas uma vez. Ação irreversível.</strong></p>
<button id="btn" onclick="seed()">Substituir cardápio no Firestore</button>
<div id="log"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBe76lIVYlw2FrFytDA74HacROTGhyQs6k",
  authDomain:"alquimia-7dfd3.firebaseapp.com",
  projectId:"alquimia-7dfd3",
  storageBucket:"alquimia-7dfd3.firebasestorage.app",
  messagingSenderId:"638103115384",
  appId:"1:638103115384:web:083c881afc8df705ba3f8d"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const CARDAPIO = [
  {cat:"bebidas",nome:"Elixir Negro",preco:10,desc:"O café especial em sua forma mais pura e desperta.",ativo:true},
  {cat:"bebidas",nome:"Alquimia Branca",preco:16,desc:"O encontro do café especial com a essência do leite de coco.",ativo:true},
  {cat:"bebidas",nome:"Pedra do Sol",preco:18,desc:"Café especial, leite de coco e cacau. Três elementos ancestrais em uma única xícara.",ativo:true},
  {cat:"bebidas",nome:"Poção da Leveza",preco:14,desc:"Suco cremoso de banana com limão. Revitalizante.",ativo:true},
  {cat:"bebidas",nome:"Verde Essencial",preco:14,desc:"Suco de couve, limão e gengibre. Para os corajosos.",ativo:true},
  {cat:"bebidas",nome:"Elixir da Lua Vermelha",preco:14,desc:"Limonada de limão, essência de beterraba e água com gás. Refrescante como uma revelação.",ativo:true},
  {cat:"bebidas",nome:"Água da Fonte",preco:10,desc:"Água de coco colhida aqui no Espaço. Servida gelada.",ativo:true},
  {cat:"comidas",nome:"Pedra Filosofal",preco:32,desc:"Focaccia artesanal (300g) com creme de amendoim e folhas verdes. O simples transformado em precioso.",ativo:true},
  {cat:"comidas",nome:"Tríade Alquímica",preco:28,desc:"Três esfiras artesanais veganas e sem glúten com cremes de amendoim, ora-pro-nóbis e tomate seco. Três elementos em perfeita harmonia.",ativo:true},
  {cat:"comidas",nome:"Ritual do Dia",preco:22,desc:"Quatro fatias de pão integral com geleia de uva e maçã e manteiga vegetal de coco. Um convite para uma pausa de presença e sabor.",ativo:true},
  {cat:"comidas",nome:"Caldeirão da Casa",preco:26,desc:"Creme artesanal de ervilhas, lentilhas ou abóbora conforme inspiração do dia, com duas fatias de pão integral. O alimento que aquece e acolhe.",ativo:true},
  {cat:"comidas",nome:"Doce Transmutação",preco:20,desc:"Três esfiras integrais com geleia probiótica de maçã e canela. O final perfeito para um pequeno ritual de sabor.",ativo:true},
  {cat:"comidas",nome:"Lua de Coco",preco:18,desc:"Cinco panelinhas de coco artesanal. Um doce delicado que transforma simplicidade em encantamento.",ativo:true},
];

const log = document.getElementById("log");
const linha = (txt,cls) => { log.innerHTML += `<span class="${cls||""}">${txt}\n</span>`; };

window.seed = async () => {
  const btn = document.getElementById("btn");
  btn.disabled = true; btn.textContent = "Executando…";
  log.innerHTML = "";
  try {
    linha("🗑️  Apagando cardápio atual…");
    const snap = await getDocs(collection(db,"cardapio"));
    for(const d of snap.docs) await deleteDoc(doc(db,"cardapio",d.id));
    linha(`   ${snap.size} itens removidos.`,"ok");
    linha("\n✨ Inserindo novo cardápio…");
    for(const item of CARDAPIO){
      await addDoc(collection(db,"cardapio"), item);
      linha(`   ✓ ${item.nome} — R$ ${item.preco}`,"ok");
    }
    linha("\n⚙️  Atualizando config…");
    await setDoc(doc(db,"config","evento"),{
      limite:30, data:"18 de Julho", hora:"15h às 21h",
      cardapio_aberto:false, acompanhantes_ativo:true
    },{merge:true});
    linha("   ✓ Config atualizada.","ok");
    linha("\n✅ Concluído! Pode fechar esta página.","ok");
    btn.textContent = "Concluído ✓";
  } catch(e) {
    linha(`\n❌ Erro: ${e.message}`,"err");
    btn.disabled = false; btn.textContent = "Tentar novamente";
  }
};
</script>
</body>
</html>
