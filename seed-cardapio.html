const firebaseConfig = {
  apiKey:"AIzaSyBe76lIVYlw2FrFytDA74HacROTGhyQs6k",
  authDomain:"alquimia-7dfd3.firebaseapp.com",
  projectId:"alquimia-7dfd3",
  storageBucket:"alquimia-7dfd3.firebasestorage.app",
  messagingSenderId:"638103115384",
  appId:"1:638103115384:web:083c881afc8df705ba3f8d"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const ITENS = [
  {cat:"quentes",nome:"Café Coado da Chapada",desc:"Grão da Chapada Diamantina, coado na hora com água de poço natural",preco:8,ativo:true},

  {cat:"quentes",nome:"Chá de Nibs de Cacau",desc:"Infusão de nibs de cacau em água de poço — levemente amargo e reconfortante",preco:12,ativo:true},
  {cat:"frias",nome:"Café Gelado do Mangará",desc:"Café coado da Chapada resfriado, leite de coco orgânico e canela da casa",preco:18,ativo:true},
  {cat:"frias",nome:"Suco de Banana com Limão",desc:"Banana orgânica do Espaço, limão taiti ou galego — cremoso, sem adição de água",preco:14,ativo:true},

const log = document.getElementById("log");

window.seed = async () => {
  log.textContent = "Iniciando…\n";
  try {
    for(const item of ITENS){
      await addDoc(collection(db,"cardapio"), item);
      log.textContent += `✓ ${item.nome}\n`;
    }
    // Config inicial
    await setDoc(doc(db,"config","evento"),{
      limite: 30,
      data: "18 de Julho",
      hora: "15h às 21h"
    });
    log.textContent += "\n✅ Cardápio e config populados com sucesso!\nVocê pode fechar esta página.";
  } catch(e) {
    log.textContent += `\n❌ Erro: ${e.message}`;
  }
};
</script>
</body>
</html>
