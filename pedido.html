<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cardápio · Café Alquimia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --perg:#E8DFC8;--perg-lt:#F2EAD8;--perg-dk:#D6C9AD;
  --gold:#9A7A2E;--gold-lt:#C49A3C;--espresso:#2A1A08;
  --mocha:#5A3A18;--olive:#4A5230;--border:#C8B88A;
  --verde:#2D6A2D;
}
body{background:var(--perg-lt);font-family:'Jost',sans-serif;font-weight:300;color:var(--espresso);padding-bottom:100px}

/* IDENTIFICAÇÃO */
.ident-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.ident-card{background:var(--perg);border:.5px solid var(--border);padding:2.5rem 1.75rem;width:100%;max-width:400px;text-align:center}
.ident-brand{font-family:'Cormorant Garamond',serif;font-size:32px;font-style:italic;color:var(--espresso);margin-bottom:.25rem}
.ident-brand em{color:var(--gold)}
.ident-sub{font-size:12px;font-style:italic;color:var(--mocha);margin-bottom:2rem;letter-spacing:.06em}
.ident-field{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;text-align:left}
.ident-field label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mocha)}
.ident-field input{width:100%;height:48px;padding:0 14px;background:var(--perg-lt);border:.5px solid var(--border);font-family:'Jost',sans-serif;font-size:16px;color:var(--espresso);outline:none;border-radius:0}
.ident-field input:focus{border-color:var(--gold)}
.btn-ident{width:100%;padding:14px;background:var(--espresso);color:var(--perg-lt);border:none;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;letter-spacing:.12em;cursor:pointer;margin-top:.5rem}
.ident-erro{display:none;font-size:12px;color:#8B2020;margin-top:.75rem;font-style:italic}

/* CARDÁPIO */
.cardapio{display:none}
.hdr{background:var(--espresso);padding:1rem 1.25rem;text-align:center;border-bottom:1px solid var(--gold)}
.hdr-nome{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--gold-lt);margin-bottom:2px}
.hdr-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--perg-lt)}

/* abas de categoria */
.abas{display:flex;overflow-x:auto;background:var(--perg);border-bottom:.5px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.abas::-webkit-scrollbar{display:none}
.aba{flex-shrink:0;padding:10px 16px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mocha);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.aba.ativa{color:var(--gold);border-bottom-color:var(--gold)}

.body{max-width:500px;margin:0 auto;padding:1.25rem 1rem}

.secao{display:none}
.secao.ativa{display:block}
.sec-titulo{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.sec-titulo::after{content:'';flex:1;height:.5px;background:var(--border)}

.item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--perg-dk)}
.item:last-child{border-bottom:none}
.item-info{flex:1}
.item-nome{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--espresso);margin-bottom:3px}
.item-desc{font-size:12px;font-style:italic;color:var(--mocha);line-height:1.5;margin-bottom:4px}
.item-preco{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold)}
.item-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:.5px solid var(--border);color:var(--mocha)}
.tag.veg{border-color:#3A5228;color:#3A5228}

/* controle de quantidade */
.qtd-ctrl{display:flex;align-items:center;gap:0;flex-shrink:0}
.qtd-btn{width:32px;height:32px;background:var(--perg-dk);border:.5px solid var(--border);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--espresso);font-weight:300;user-select:none;-webkit-user-select:none}
.qtd-btn:active{background:var(--border)}
.qtd-num{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--espresso);background:var(--perg-lt);border-top:.5px solid var(--border);border-bottom:.5px solid var(--border)}

/* carrinho fixo */
.carrinho-bar{position:fixed;bottom:0;left:0;right:0;background:var(--espresso);padding:12px 1.25rem;display:none;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid var(--gold);z-index:100}
.carrinho-bar.visivel{display:flex}
.carr-info{color:var(--perg-lt)}
.carr-qtd{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-lt);margin-bottom:2px}
.carr-total{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--perg-lt)}
.btn-enviar{padding:11px 24px;background:var(--gold);color:var(--perg-lt);border:none;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;letter-spacing:.1em;cursor:pointer;white-space:nowrap}

/* confirmação */
.confirmacao{display:none;min-height:100vh;align-items:center;justify-content:center;padding:2rem}
.conf-card{background:var(--perg);border:.5px solid var(--border);padding:3rem 2rem;max-width:400px;width:100%;text-align:center}
.conf-icon{font-size:28px;color:var(--gold);margin-bottom:1rem;letter-spacing:.3em}
.conf-titulo{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--espresso);margin-bottom:.75rem}
.conf-msg{font-size:14px;font-style:italic;color:var(--mocha);line-height:1.9;margin-bottom:1.5rem}
.btn-mais{padding:10px 24px;border:.5px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;letter-spacing:.1em;cursor:pointer}
</style>
</head>
<body>

<!-- IDENTIFICAÇÃO -->
<div class="ident-wrap" id="tela-ident">
  <div class="ident-card">
    <div class="ident-brand">Café <em>Alquimia</em></div>
    <div class="ident-sub">Seu cardápio pessoal</div>
    <div class="ident-field">
      <label>Seu nome</label>
      <input type="text" id="ident-nome" placeholder="Como você se chama?" autocomplete="off">
    </div>
    <button class="btn-ident" onclick="identificar()">Ver cardápio</button>
    <div class="ident-erro" id="ident-erro">Informe seu nome para continuar.</div>
  </div>
</div>

<!-- CARDÁPIO -->
<div class="cardapio" id="tela-cardapio">
  <div class="hdr">
    <div class="hdr-nome" id="hdr-nome"></div>
    <div class="hdr-brand">Café Alquimia</div>
  </div>

  <div class="abas" id="abas">
    <div class="aba ativa" onclick="mudarAba(0)">Quentes</div>
    <div class="aba" onclick="mudarAba(1)">Frias</div>
    <div class="aba" onclick="mudarAba(2)">Comes</div>
    <div class="aba" onclick="mudarAba(3)">Doces</div>
  </div>

  <div class="body">

    <!-- QUENTES -->
    <div class="secao ativa" id="sec-0">
      <div class="sec-titulo">Bebidas quentes</div>
      <div id="items-0"></div>
    </div>

    <!-- FRIAS -->
    <div class="secao" id="sec-1">
      <div class="sec-titulo">Bebidas frias</div>
      <div id="items-1"></div>
    </div>

    <!-- COMES -->
    <div class="secao" id="sec-2">
      <div class="sec-titulo">Comes leves</div>
      <div id="items-2"></div>
    </div>

    <!-- DOCES -->
    <div class="secao" id="sec-3">
      <div class="sec-titulo">Doces & afetos</div>
      <div id="items-3"></div>
    </div>

  </div>
</div>

<!-- CARRINHO -->
<div class="carrinho-bar" id="carrinho-bar">
  <div class="carr-info">
    <div class="carr-qtd" id="carr-qtd">0 itens</div>
    <div class="carr-total" id="carr-total">R$ 0</div>
  </div>
  <button class="btn-enviar" onclick="enviarPedido()">Enviar pedido</button>
</div>

<!-- CONFIRMAÇÃO -->
<div class="confirmacao" id="tela-conf">
  <div class="conf-card">
    <div class="conf-icon">· ✦ ·</div>
    <div class="conf-titulo">Pedido enviado!</div>
    <p class="conf-msg">Seu pedido foi recebido.<br>O barista já está preparando com carinho.</p>
    <button class="btn-mais" onclick="novoPedido()">Fazer mais um pedido</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, arrayUnion, increment }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBe76lIVYlw2FrFytDA74HacROTGhyQs6k",
  authDomain:"alquimia-7dfd3.firebaseapp.com",
  projectId:"alquimia-7dfd3",
  storageBucket:"alquimia-7dfd3.firebasestorage.app",
  messagingSenderId:"638103115384",
  appId:"1:638103115384:web:083c881afc8df705ba3f8d"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// CARDÁPIO LOCAL
const CARDAPIO = [
  { cat:0, nome:"Café Coado da Chapada", desc:"Grão da Chapada Diamantina, coado na hora com água de poço natural", preco:8, tags:["vegano","água de poço"] },
  { cat:0, nome:"Café Alquímico", desc:"Café coado, leite de coco orgânico e canela colhida no Espaço — assinatura da casa", preco:16, tags:["plant-based","assinatura"] },
  { cat:0, nome:"Chá do Quintal", desc:"Capim-limão e erva-cidreira frescos do Mangará, água de poço natural", preco:10, tags:["vegano","colhido no espaço"] },
  { cat:0, nome:"Chá do Cravo com Canela", desc:"Folhas de cravo e canela da casa, infusão lenta em água de poço", preco:10, tags:["vegano","colhido no espaço"] },
  { cat:0, nome:"Chá de Nibs de Cacau", desc:"Infusão de nibs de cacau em água de poço — levemente amargo e reconfortante", preco:12, tags:["vegano","água de poço"] },
  { cat:1, nome:"Café Gelado do Mangará", desc:"Café coado da Chapada resfriado, leite de coco orgânico e canela da casa", preco:18, tags:["plant-based"] },
  { cat:1, nome:"Suco de Banana com Limão", desc:"Banana orgânica do Espaço, limão taiti ou galego — cremoso, sem adição de água", preco:14, tags:["vegano","colhido no espaço"] },
  { cat:1, nome:"Água de Coco Natural", desc:"Colhida no Espaço Terapêutico Mangará, servida gelada", preco:10, tags:["vegano","colhida no espaço"] },
  { cat:1, nome:"Limonada do Quintal", desc:"Limão galego ou taiti, capim-limão fresco, água de poço natural gelada", preco:12, tags:["vegano","água de poço"] },
  { cat:1, nome:"Licor de Jenipapo", desc:"Produção artesanal da casa — dose única, encorpado e aromático", preco:16, tags:["artesanal","contém álcool"] },
  { cat:1, nome:"Drinque Alquimia", desc:"Licor de jenipapo, água de coco, limão galego e capim-limão — combinação da casa", preco:22, tags:["assinatura","contém álcool"] },
  { cat:2, nome:"Pão Integral do Mangará", desc:"Artesanal integral com manteiga de óleo de coco, azeite e especiarias", preco:16, tags:["plant-based","artesanal"] },
  { cat:2, nome:"Pão com Ora-pro-nóbis", desc:"Integral enriquecido com ora-pro-nóbis colhida no Espaço — alto teor proteico", preco:18, tags:["plant-based","colhida no espaço"] },
  { cat:2, nome:"Pãozinho de Polvilho", desc:"Sem lactose, leve e crocante — assado na hora", preco:12, tags:["vegano","sem lactose"] },
  { cat:2, nome:"Tábua da Casa", desc:"Pão integral + pão ora-pro-nóbis + polvilho, manteiga de coco e geleia à escolha — para 2", preco:38, tags:["plant-based","para compartilhar"] },
  { cat:2, nome:"Maionese de Ora-pro-nóbis", desc:"Artesanal com ora-pro-nóbis fresca do Espaço — acompanha pão ou polvilho", preco:14, tags:["plant-based","colhida no espaço"] },
  { cat:3, nome:"Doce de Jaca", desc:"Preparo artesanal lento, jaca madura do Espaço", preco:12, tags:["vegano","colhida no espaço"] },
  { cat:3, nome:"Doce de Banana", desc:"Banana orgânica do Mangará com canela e cravo da casa", preco:12, tags:["vegano","ingredientes do espaço"] },
  { cat:3, nome:"Doce de Carambola", desc:"Carambola em calda artesanal — cítrico e delicado", preco:12, tags:["vegano","colhida no espaço"] },
  { cat:3, nome:"Geleia de Jaca", desc:"Produção artesanal da casa — acompanha pão ou polvilho", preco:10, tags:["vegano","artesanal"] },
  { cat:3, nome:"Geleia de Uva com Maçã", desc:"Blend artesanal frutado com acidez equilibrada", preco:10, tags:["vegano","artesanal"] },
  { cat:3, nome:"Trio de Doces do Espaço", desc:"Uma porção de jaca, banana e carambola — para provar tudo", preco:30, tags:["vegano","para compartilhar"] },
];

let carrinho = {}; // {nome: {preco, qtd}}
let nomeCliente = "";
let comandaId = "";

// Renderizar cardápio
CARDAPIO.forEach(item => {
  const el = document.getElementById(`items-${item.cat}`);
  const id = item.nome.replace(/\s+/g,"-").toLowerCase();
  const tagsHtml = item.tags.map(t => {
    const isVeg = t.includes("vegano")||t.includes("plant")||t.includes("colhid");
    return `<span class="tag ${isVeg?"veg":""}">${t}</span>`;
  }).join("");
  el.innerHTML += `
  <div class="item">
    <div class="item-info">
      <div class="item-nome">${item.nome}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-preco">R$ ${item.preco}</div>
      <div class="item-tags">${tagsHtml}</div>
    </div>
    <div class="qtd-ctrl">
      <div class="qtd-btn" onclick="decrementar('${item.nome}',${item.preco})">−</div>
      <div class="qtd-num" id="qtd-${id}">0</div>
      <div class="qtd-btn" onclick="incrementar('${item.nome}',${item.preco})">+</div>
    </div>
  </div>`;
});

window.mudarAba = (i) => {
  document.querySelectorAll(".aba").forEach((a,idx) => a.classList.toggle("ativa", idx===i));
  document.querySelectorAll(".secao").forEach((s,idx) => s.classList.toggle("ativa", idx===i));
};

window.incrementar = (nome, preco) => {
  if(!carrinho[nome]) carrinho[nome] = {preco, qtd:0};
  carrinho[nome].qtd++;
  atualizarQtd(nome);
  atualizarCarrinho();
};
window.decrementar = (nome, preco) => {
  if(!carrinho[nome] || carrinho[nome].qtd===0) return;
  carrinho[nome].qtd--;
  if(carrinho[nome].qtd===0) delete carrinho[nome];
  atualizarQtd(nome);
  atualizarCarrinho();
};
function atualizarQtd(nome){
  const id = nome.replace(/\s+/g,"-").toLowerCase();
  const el = document.getElementById(`qtd-${id}`);
  if(el) el.textContent = carrinho[nome]?.qtd || 0;
}
function atualizarCarrinho(){
  const itens = Object.entries(carrinho).filter(([,v])=>v.qtd>0);
  const total = itens.reduce((s,[,v])=>s+(v.preco*v.qtd),0);
  const qtd   = itens.reduce((s,[,v])=>s+v.qtd,0);
  const bar   = document.getElementById("carrinho-bar");
  if(qtd>0){
    bar.classList.add("visivel");
    document.getElementById("carr-qtd").textContent = `${qtd} ${qtd===1?"item":"itens"}`;
    document.getElementById("carr-total").textContent = `R$ ${total}`;
  } else {
    bar.classList.remove("visivel");
  }
}

window.identificar = async () => {
  const nome = document.getElementById("ident-nome").value.trim();
  if(!nome){ document.getElementById("ident-erro").style.display="block"; return; }
  nomeCliente = nome;

  // busca comanda aberta pelo nome
  const q = query(collection(db,"comandas"), where("nome","==",nome), where("status","==","aberta"));
  const snap = await getDocs(q);
  if(!snap.empty){
    comandaId = snap.docs[0].id;
  }

  document.getElementById("tela-ident").style.display = "none";
  document.getElementById("tela-cardapio").style.display = "block";
  document.getElementById("hdr-nome").textContent = `Olá, ${nome}`;
};

window.enviarPedido = async () => {
  const itens = Object.entries(carrinho)
    .filter(([,v])=>v.qtd>0)
    .map(([nome,v])=>({ nome, preco:v.preco, qtd:v.qtd, hora:new Date().toISOString() }));
  if(!itens.length) return;
  const total = itens.reduce((s,i)=>s+(i.preco*i.qtd),0);

  try {
    if(comandaId){
      await updateDoc(doc(db,"comandas",comandaId),{
        itens: arrayUnion(...itens),
        total: increment(total)
      });
    } else {
      // cria comanda nova se não tiver check-in prévio
      const ref = await addDoc(collection(db,"comandas"),{
        nome: nomeCliente, wpp:"", qtd:1,
        status:"aberta", itens, total,
        aberta_em: new Date().toISOString()
      });
      comandaId = ref.id;
    }

    // zera carrinho visual
    Object.keys(carrinho).forEach(nome => {
      const id = nome.replace(/\s+/g,"-").toLowerCase();
      const el = document.getElementById(`qtd-${id}`);
      if(el) el.textContent = "0";
    });
    carrinho = {};
    atualizarCarrinho();

    document.getElementById("tela-cardapio").style.display = "none";
    document.getElementById("tela-conf").style.display = "flex";
  } catch(e){
    alert("Erro ao enviar pedido. Tente novamente.");
  }
};

window.novoPedido = () => {
  document.getElementById("tela-conf").style.display = "none";
  document.getElementById("tela-cardapio").style.display = "block";
};
</script>
</body>
</html>
