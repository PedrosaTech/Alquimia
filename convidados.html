<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convidados · Café Alquimia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --creme:#F8F4EC;--creme-dk:#EDE4D0;--border:#C8D4A0;
  --ouro:#B8923A;--ouro-lt:#D4AC5A;
  --verde:#2A4A18;--verde-md:#7A9A4A;
  --espresso:#2A1A08;--mocha:#5A3A18;
}
body{background:var(--creme);font-family:'Jost',sans-serif;font-weight:300;color:var(--espresso);min-height:100vh}

/* LOADING */
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.load-ico{font-size:28px;animation:girar 3s linear infinite;display:inline-block}
@keyframes girar{to{transform:rotate(360deg)}}
.load-txt{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--mocha);font-size:16px}

/* ERRO */
.erro-wrap{min-height:100vh;display:none;align-items:center;justify-content:center;padding:2rem;text-align:center}
.erro-txt{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--mocha)}

/* HEADER */
.hdr{background:var(--verde);padding:1.5rem;text-align:center;border-bottom:.5px solid #3A6028}
.hdr-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ouro-lt);margin-bottom:.5rem}
.hdr-titulo{font-family:'Playfair Display',serif;font-size:26px;font-style:italic;color:var(--creme);margin-bottom:.25rem}
.hdr-sub{font-size:13px;color:#A8C080;letter-spacing:.05em}

/* BORDA FLORAL */
.borda{width:100%;display:block}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:.5px solid var(--border)}
.stat{background:var(--creme);padding:1.25rem .5rem;text-align:center}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--espresso);line-height:1}
.stat-val.ouro{color:var(--ouro)}
.stat-val.verde{color:var(--verde-md)}
.stat-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mocha);margin-top:5px}

/* BARRA */
.prog-wrap{padding:.875rem 1.25rem;background:var(--creme-dk);border-bottom:.5px solid var(--border)}
.prog-lbl{display:flex;justify-content:space-between;font-size:13px;font-style:italic;color:var(--mocha);margin-bottom:7px}
.prog-lbl span{color:var(--ouro);font-style:normal}
.prog-track{height:2px;background:var(--border)}
.prog-fill{height:2px;background:var(--ouro);transition:width .6s ease}

/* LISTA */
.lista-wrap{max-width:600px;margin:0 auto;padding:1.25rem 1rem 3rem}

.sec-lbl{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--verde-md);display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.sec-lbl::after{content:'';flex:1;height:.5px;background:var(--border)}

.busca{width:100%;height:46px;padding:0 14px;background:var(--creme-dk);border:.5px solid var(--border);border-radius:0;font-family:'Jost',sans-serif;font-size:16px;color:var(--espresso);outline:none;margin-bottom:1.25rem}
.busca:focus{border-color:var(--ouro)}
.busca::placeholder{color:#B8A87A;font-style:italic}

/* ITEM */
.item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--creme-dk)}
.item:last-child{border-bottom:none}
.item-seq{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--border);width:24px;flex-shrink:0;text-align:right}
.item-avatar{width:38px;height:38px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--creme)}
.item-info{flex:1;min-width:0}
.item-nome{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--espresso);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-detalhe{font-size:12px;color:var(--mocha);margin-top:2px;font-style:italic}
.item-badge{background:var(--creme-dk);border:.5px solid var(--border);padding:2px 8px;font-size:11px;color:var(--mocha);flex-shrink:0}

.vazio{text-align:center;padding:2.5rem 1rem;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--mocha);font-size:17px}

/* RODAPÉ */
.ftr{background:var(--verde);padding:1.25rem;text-align:center}
.ftr-brand{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--ouro-lt);letter-spacing:.08em;margin-bottom:4px}
.ftr-dev{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5A8040}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="load-ico">🌿</div>
  <p class="load-txt">carregando lista…</p>
</div>

<div class="erro-wrap" id="erro-wrap">
  <p class="erro-txt">Lista não encontrada.<br>Verifique o link recebido.</p>
</div>

<div id="pagina" style="display:none">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-eyebrow">Lista de convidados</div>
    <div class="hdr-titulo" id="hdr-titulo">Aniversário</div>
    <div class="hdr-sub" id="hdr-sub">Café Alquimia · Espaço Terapêutico Mangará</div>
  </div>

  <!-- BORDA FLORAL -->
  <svg class="borda" viewBox="0 0 800 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="background:var(--creme-dk)">
    <path d="M0 30 Q200 10 400 25 Q600 40 800 20" fill="none" stroke="#7A9A4A" stroke-width="1" opacity=".5"/>
    <ellipse cx="200" cy="20" rx="12" ry="5" fill="#7A9A4A" opacity=".5" transform="rotate(-15 200 20)"/>
    <circle cx="200" cy="13" r="3" fill="#B8923A" opacity=".6"/>
    <ellipse cx="400" cy="28" rx="14" ry="6" fill="#4A6A28" opacity=".45" transform="rotate(8 400 28)"/>
    <circle cx="400" cy="20" r="3" fill="#D4AC5A" opacity=".6"/>
    <ellipse cx="600" cy="16" rx="12" ry="5" fill="#7A9A4A" opacity=".45" transform="rotate(-10 600 16)"/>
    <circle cx="600" cy="9" r="3" fill="#B8923A" opacity=".6"/>
  </svg>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-val ouro" id="s-confirmacoes">—</div><div class="stat-lbl">Confirmações</div></div>
    <div class="stat"><div class="stat-val" id="s-pessoas">—</div><div class="stat-lbl">Pessoas</div></div>
    <div class="stat"><div class="stat-val verde" id="s-vagas">—</div><div class="stat-lbl">Vagas livres</div></div>
  </div>

  <!-- BARRA DE OCUPAÇÃO -->
  <div class="prog-wrap">
    <div class="prog-lbl">
      <span>Ocupação</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
  </div>

  <!-- LISTA -->
  <div class="lista-wrap">
    <div class="sec-lbl" id="sec-lbl">quem já confirmou</div>
    <input class="busca" type="text" placeholder="Buscar nome…" oninput="filtrar(this.value)">
    <div id="lista"></div>
  </div>

</div>

<footer class="ftr">
  <div class="ftr-brand">Café Alquimia · Espaço Terapêutico Mangará</div>
  <div class="ftr-dev">Desenvolvido por Código da Terra</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, onSnapshot, query, where, orderBy }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyBe76lIVYlw2FrFytDA74HacROTGhyQs6k",
  authDomain:"alquimia-7dfd3.firebaseapp.com",
  projectId:"alquimia-7dfd3",
  storageBucket:"alquimia-7dfd3.firebasestorage.app",
  messagingSenderId:"638103115384",
  appId:"1:638103115384:web:083c881afc8df705ba3f8d"
};
const app = initializeApp(FB);
const db  = getFirestore(app);

const params   = new URLSearchParams(window.location.search);
const eventoId = params.get("id");

let todos  = [];
let LIMITE = 30;

async function init(){
  if(!eventoId){ mostrarErro(); return; }

  const snap = await getDoc(doc(db,"eventos",eventoId));
  if(!snap.exists() || snap.data().ativo === false){ mostrarErro(); return; }

  const ev = snap.data();
  LIMITE = ev.limite || 30;

  document.getElementById("hdr-titulo").textContent =
    `Aniversário de ${ev.nome}`;
  document.getElementById("hdr-sub").textContent =
    `${ev.data} · ${ev.hora} · Café Alquimia`;
  document.title = `Convidados — ${ev.nome}`;

  // stream em tempo real
  onSnapshot(
    query(collection(db,"confirmacoes_evento"), where("evento_id","==",eventoId)),
    snap => {
      todos = snap.docs
        .map(d => ({id:d.id,...d.data()}))
        .sort((a,b) => (a.criadoEm||"").localeCompare(b.criadoEm||""));
      atualizarStats();
      renderizar(todos);
    }
  );

  document.getElementById("loading").style.display = "none";
  document.getElementById("pagina").style.display  = "block";
}

function atualizarStats(){
  const total  = todos.length;
  const pessoas= todos.reduce((s,r)=>s+(r.qtd||1),0);
  const livres = Math.max(LIMITE - pessoas, 0);
  const pct    = Math.min(Math.round((pessoas/LIMITE)*100),100);

  document.getElementById("s-confirmacoes").textContent = total;
  document.getElementById("s-pessoas").textContent      = pessoas;
  document.getElementById("s-vagas").textContent        = livres;
  document.getElementById("prog-fill").style.width      = pct + "%";
  document.getElementById("prog-pct").textContent       = pct + "%";
  document.getElementById("sec-lbl").textContent        =
    total === 0 ? "nenhuma confirmação ainda" :
    total === 1 ? "1 pessoa confirmou" :
    `${total} pessoas confirmaram`;
}

function renderizar(rows){
  const el = document.getElementById("lista");
  if(!rows.length){
    el.innerHTML = `<div class="vazio">🌸 Nenhuma confirmação ainda.<br>Compartilhe o link do convite!</div>`;
    return;
  }
  el.innerHTML = rows.map((r,i) => {
    const inicial = (r.nome||"?")[0].toUpperCase();
    const dt = r.criadoEm
      ? new Date(r.criadoEm).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})
      : "";
    const acomp = (r.qtd||1) > 1 ? ` · +${(r.qtd||1)-1} acompanhante${(r.qtd||1)>2?"s":""}` : "";
    return `<div class="item">
      <span class="item-seq">${i+1}</span>
      <div class="item-avatar">${inicial}</div>
      <div class="item-info">
        <div class="item-nome">${esc(r.nome||"—")}</div>
        <div class="item-detalhe">${dt}${acomp}</div>
      </div>
      ${(r.qtd||1)>1?`<span class="item-badge">${r.qtd} pessoas</span>`:""}
    </div>`;
  }).join("");
}

window.filtrar = (q) => {
  const termo = q.toLowerCase();
  renderizar(todos.filter(r => (r.nome||"").toLowerCase().includes(termo)));
};

function mostrarErro(){
  document.getElementById("loading").style.display   = "none";
  document.getElementById("erro-wrap").style.display = "flex";
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

init();
</script>
</body>
</html>
